# Produção: na VM, crie um .env ao lado deste arquivo com pelo menos:
#   DOCKERHUB_USERNAME=seu_usuario_dockerhub
# Opcional: IMAGE_TAG=latest, HTTP_PORT=80
#
# A URL da API (VITE_FRONTEND_API_URL) é embutida no build pelo Vite.
# Defina no GitHub: Settings → Secrets and variables → Actions → Variables
# (ex.: VITE_FRONTEND_API_URL=https://api.seudominio.com/clinicamedagil-service).
# O workflow passa essa variável no `docker compose build`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_FRONTEND_API_URL: ${VITE_FRONTEND_API_URL:-/clinicamedagil-service}
    image: docker.io/${DOCKERHUB_USERNAME}/clinicamedagil-web:${IMAGE_TAG:-latest}
    container_name: frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      # Onde a API Spring escuta, alcançável a partir deste container (não use IP público da Oracle aqui).
      BACKEND_HOST: ${BACKEND_HOST:-172.17.0.1}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
    restart: unless-stopped
