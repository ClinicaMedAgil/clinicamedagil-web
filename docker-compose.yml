# Frontend e API em containers separados (sem serviço "backend" neste arquivo).
#
# Fluxo:
# - Navegador → IP público do front (ex.: 134.65.24.235:80) → /clinicamedagil-service/...
# - Container do front (nginx) → proxy para BACKEND_HOST:BACKEND_PORT (rede que o container alcança)
#
# Defina BACKEND_HOST / BACKEND_PORT como a API é vista de DENTRO do container web:
#
# Cenário usual — front e API em VMs/host diferentes: não há conflito de porta 80 entre os dois;
# cada máquina tem o seu :80. Use o IP privado da VM da API na VCN (ex.: 172.19.0.1) e a porta
# em que o Nginx/API escuta na rede (Security Lists / rotas entre subnets liberadas).
#
# Opcional — API no mesmo host Docker que o front: descomente networks abaixo (clinicamedagil_net),
# BACKEND_HOST=api BACKEND_PORT=8080 (ou nginx:80 se o tráfego passar só pelo Nginx da API).
#
# .env ao lado deste arquivo (exemplo):
#   VITE_FRONTEND_API_URL=/clinicamedagil-service
#   BACKEND_HOST=172.19.0.1
#   BACKEND_PORT=8080
#   HTTP_PORT=80
#   IMAGE_TAG=latest

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_FRONTEND_API_URL: ${VITE_FRONTEND_API_URL:-/clinicamedagil-service}
    image: clinicamedagil-web:${IMAGE_TAG:-latest}
    container_name: clinicamedagil-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      # VMs diferentes: IP privado da VM da API. Mesmo host Docker: nginx (ver comentários acima).
      BACKEND_HOST: ${BACKEND_HOST:-172.19.0.1}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
    restart: unless-stopped
    # Descomente para usar rede externa compartilhada com o compose da API (mesmo host Docker):
    # networks:
    #   - clinicamedagil_net

# networks:
#   clinicamedagil_net:
#     external: true
#     name: clinicamedagil_net
